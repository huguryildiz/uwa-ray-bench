<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="scope" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#0c2418"/>
      <stop offset="1" stop-color="#05130c"/>
    </radialGradient>
    <linearGradient id="sweep" x1="32" y1="32" x2="60" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#39ff85" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#39ff85" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="disc"><circle cx="32" cy="32" r="29"/></clipPath>
  </defs>

  <circle cx="32" cy="32" r="29" fill="url(#scope)" stroke="#39ff85" stroke-opacity="0.5" stroke-width="1.6"/>

  <g clip-path="url(#disc)" stroke="#39ff85" fill="none">
    <!-- range rings -->
    <g stroke-opacity="0.30" stroke-width="0.9">
      <circle cx="32" cy="32" r="8"/>
      <circle cx="32" cy="32" r="15"/>
      <circle cx="32" cy="32" r="22"/>
    </g>
    <!-- crosshair -->
    <g stroke-opacity="0.20" stroke-width="0.9">
      <line x1="3" y1="32" x2="61" y2="32"/>
      <line x1="32" y1="3" x2="32" y2="61"/>
    </g>

    <!-- rotating sweep -->
    <g>
      <path d="M32 32 L32 3 A29 29 0 0 1 60 24.5 Z" fill="url(#sweep)"/>
      <line x1="32" y1="32" x2="32" y2="3" stroke="#9dffc4" stroke-width="1.6" filter="url(#glow)"/>
      <animateTransform attributeName="transform" type="rotate"
        from="0 32 32" to="360 32 32" dur="3.6s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- contact blip -->
  <circle cx="42" cy="20" r="2.2" fill="#9dffc4" filter="url(#glow)">
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.18;0.5;1" dur="3.6s" repeatCount="indefinite"/>
  </circle>
  <!-- hub -->
  <circle cx="32" cy="32" r="2" fill="#39ff85"/>
</svg>
