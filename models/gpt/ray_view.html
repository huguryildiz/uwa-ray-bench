      button.classList.toggle("active", nextValue);
      button.setAttribute("aria-pressed", String(nextValue));
    }

    function attachEvents() {
      window.addEventListener("resize", resizeCanvas);

      document.querySelectorAll("[data-minimize-target]").forEach(button => {
        button.addEventListener("click", () => {
          const target = button.getAttribute("data-minimize-target");
          if (target === "arrivals" || target === "section") {
            toggleCanvasCard(target);
          } else {
            togglePanel(target);
          }
        });
      });

      playBtn.addEventListener("click", () => {
        if (state.tracing) return;
        state.playing = !state.playing;
        playBtn.textContent = state.playing ? "Pause" : "Play";
      });

      resetBtn.addEventListener("click", () => {
        state.playing = false;
        state.currentTime = 0;
        timeSlider.value = "0";
        timeOut.textContent = "0.0 s";
        playBtn.textContent = "Play";
      });

      cameraBtn.addEventListener("click", resetCamera);

      canonicalBtn.addEventListener("click", () => {
        elevSlider.value = String(CANONICAL.elevBeams);
        azSlider.value = String(CANONICAL.azBeams);
        elevOut.textContent = String(CANONICAL.elevBeams);
        azOut.textContent = String(CANONICAL.azBeams);
        scheduleTrace();
      });

      elevSlider.addEventListener("input", scheduleTrace);
      azSlider.addEventListener("input", scheduleTrace);

      timeSlider.addEventListener("input", () => {
        state.currentTime = Number(timeSlider.value);
        timeOut.textContent = `${state.currentTime.toFixed(1)} s`;
      });

      opacitySlider.addEventListener("input", () => {
        opacityOut.textContent = `${opacitySlider.value}%`;
      });

      tlToggle.addEventListener("change", () => {
        colorbarEl.classList.toggle("show", tlToggle.checked);
      });

      canvas.addEventListener("pointerdown", event => {
        canvas.setPointerCapture(event.pointerId);
        state.pointer = {
          id: event.pointerId,
          x: event.clientX,
          y: event.clientY,
          yaw: camera.yaw,
          pitch: camera.pitch
        };
      });

      canvas.addEventListener("pointermove", event => {
        if (!state.pointer || state.pointer.id !== event.pointerId) return;
        const dx = event.clientX - state.pointer.x;
        const dy = event.clientY - state.pointer.y;
        camera.yaw = state.pointer.yaw + dx * 0.006;
        camera.pitch = clamp(state.pointer.pitch + dy * 0.005, -1.08, 1.08);
      });

      canvas.addEventListener("pointerup", event => {
        if (state.pointer && state.pointer.id === event.pointerId) state.pointer = null;
      });

      canvas.addEventListener("pointercancel", () => {
        state.pointer = null;
      });

      canvas.addEventListener("wheel", event => {
        event.preventDefault();
        const factor = Math.exp(-event.deltaY * 0.001);
        camera.zoom = clamp(camera.zoom * factor, 0.55, 2.4);
      }, { passive: false });
    }

    function init() {
      state.seabedMesh = buildSeabedMesh();
      state.crossSection = buildCrossSection();
      resizeCanvas();
      attachEvents();
      updateMetricsPanel();
      requestAnimationFrame(render);
      performTrace();
    }

    window.rayViewDebug = {
      traceRay,
      traceFan,
      soundSpeed,
      bathymetry,
      bathymetryGradient,
      camera,
      constants: { DOMAIN, SOURCE, RECEIVER, CANONICAL, GRID, CAMERA_HOME, CAMERA_FRAME }
    };

    init();
  </script>
<script>
(function(){
  var CTRL_SELS=['.topbar'];
  var ALL_SELS=['.topbar','#legend','#statusPanel','#colorbar'];
  window.addEventListener('message',function(e){
    var d=e.data; if(!d)return;
    var t=d.type,v,btn,es,as,ss,os,opts,minD,nearest;
    if(t==='hide_ui'){
      v=d.hidden?'none':'';
      ALL_SELS.forEach(function(s){document.querySelectorAll(s).forEach(function(el){el.style.display=v;});});
    } else if(t==='hide_controls'){
      CTRL_SELS.forEach(function(s){document.querySelectorAll(s).forEach(function(el){el.style.display='none';});});
    } else if(t==='play'){
      btn=document.getElementById('playBtn'); if(btn&&btn.textContent==='Play')btn.click();
    } else if(t==='pause'){
      btn=document.getElementById('playBtn'); if(btn&&btn.textContent==='Pause')btn.click();
    } else if(t==='reset'){
      btn=document.getElementById('resetBtn'); if(btn)btn.click();
    } else if(t==='reset_camera'){
      btn=document.getElementById('cameraBtn'); if(btn)btn.click();
    } else if(t==='set_stop'){
      es=document.getElementById('elevSlider'); as=document.getElementById('azSlider');
      if(es&&d.elev!=null){es.value=d.elev; es.dispatchEvent(new Event('input'));}
      if(as&&d.azim!=null){as.value=d.azim; as.dispatchEvent(new Event('input'));}
    } else if(t==='set_speed'){
      ss=document.getElementById('speedSelect');
      if(ss){
        opts=['0.5','1','2','4']; nearest='1'; minD=Infinity;
        opts.forEach(function(o){var dv=Math.abs(+o-(+d.speed||1));if(dv<minD){minD=dv;nearest=o;}});
        ss.value=nearest; ss.dispatchEvent(new Event('change'));
      }
    } else if(t==='set_opacity'){
      os=document.getElementById('opacitySlider');
      if(os){os.value=Math.round((+d.v||0)*100); os.dispatchEvent(new Event('input'));}
    }
  });
})();
</script>
